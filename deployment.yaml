apiVersion: apps/v1
kind: Deployment

metadata:
  name: mma-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: mma

  template:
    metadata:
      labels:
        app: mma

    spec:
      containers:
      - name: mma-container
        image: mma
        imagePullPolicy: always

        ports:
        - containerPort: 3000
